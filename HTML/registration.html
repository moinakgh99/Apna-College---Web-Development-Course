<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form action="/actions">
    <h1>Registration Form</h1>
    <label for="name">Enter Firstname : </label>
    <input type="text" name="name" id="name" placeholder="Enter ur Name">
    <br>
    <label for="lname">Enter Lastname : </label>
    <input type="text" name="lname" id="lname" placeholder="Enter ur last name">
    <br>
    <label for="gender">PLese Select ur gender : </label>
    <select name="gender" id="gender">
        <option value="option" selected>Please select ur option</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>
    <br>
    <label for="chck">Do u agree to all terms of services ?</label>
    <input type="checkbox" name="chck" id="chck">
    <label for="chck">Yes, I agree</label>
    <br>
    <button>Submit</button>
    </form>
</body>
</html>
